<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Auth Container -->

<!-- Logo Header (TopAppBar Influence) -->

<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-4xl text-blue-700 font-black" data-icon="api">api</span>
<span class="text-2xl font-black tracking-tight text-blue-700 font-headline">Rezzap</span>
</div>
<div class="text-center space-y-2">
<h1 class="font-headline font-extrabold text-3xl md:text-4xl text-on-surface tracking-tight">Create your account</h1>
<p class="text-on-surface-variant text-base">Start your AI-powered career journey.</p>
</div>
</header>
<!-- Form Card (Curator Style) -->
<div class="bg-surface-container-lowest p-8 md:p-10 rounded-xl ghost-border shadow-[0_32px_64px_rgba(25,28,30,0.04)]">

<div class="space-y-3">
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-low py-3.5 px-4 rounded-lg font-label font-semibold text-on-surface hover:bg-surface-container-high transition-colors">

<button class="w-full flex items-center justify-center gap-3 bg-surface-container-low py-3.5 px-4 rounded-lg font-label font-semibold text-on-surface hover:bg-surface-container-high transition-colors">
<svg class="w-5 h-5" fill="#0077B5" viewbox="0 0 24 24">
<path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"></path>

<div class="relative my-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant opacity-30"></div>

<span class="bg-surface-container-lowest px-4 text-slate-400">OR SIGN UP WITH EMAIL</span>

<!-- Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1" for="full_name">Full Name</label>
<input class="block w-full rounded-lg bg-surface-container-low border-0 px-4 py-3.5 text-on-surface ring-0 placeholder:text-slate-400 focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="full_name" placeholder="Your full name" type="text"/>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1" for="email">Email Address</label>
<input class="block w-full rounded-lg bg-surface-container-low border-0 px-4 py-3.5 text-on-surface ring-0 placeholder:text-slate-400 focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="email" placeholder="name@company.com" type="email"/>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1" for="password">Password</label>
<input class="block w-full rounded-lg bg-surface-container-low border-0 px-4 py-3.5 text-on-surface ring-0 placeholder:text-slate-400 focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="password" placeholder="Create a strong password" type="password"/>
</div>
<button class="w-full primary-gradient text-white py-4 px-6 rounded-lg font-semibold text-lg hover:shadow-lg hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                    Create Account
                </button>
</form>
</div>

<footer class="text-center">
<p class="text-on-surface-variant font-medium">

                <a class="text-primary font-bold hover:underline ml-1" href="#">Log in</a>
</p>
</footer>

<div class="fixed bottom-0 right-0 p-12 hidden lg:block -z-10 opacity-20 pointer-events-none">
<div class="text-[12rem] font-headline font-black text-blue-100 select-none leading-none">R/Z</div>
</div>
<div class="fixed top-0 left-0 p-12 hidden lg:block -z-10">
